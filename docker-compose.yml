version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: aisle-backend:latest
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET_CURRENT=${JWT_SECRET_CURRENT}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    # Limit resources to prevent local Denial of Service (DoS) attacks
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.2'
          memory: 256M
    networks:
      - public-net
      - backend-db-net
      - backend-cache-net
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.0-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Keep Redis isolated: Only connected to backend cache network, not exposed to public-net!
    networks:
      - backend-cache-net

networks:
  public-net:
    driver: bridge
  backend-db-net:
    driver: bridge
  backend-cache-net:
    driver: bridge
