# Nginx Configuration Template for Aisle Production Deployment

upstream aisle_backend_servers {
    # Load distribution across multiple backend nodes/ports
    server 127.0.0.1:5000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5002 weight=1 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name aisle.in app.aisle.in admin.aisle.in;
    return 301 https://$host$request_uri;
}

# HTTPS Server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aisle.in app.aisle.in admin.aisle.in;

    # SSL Certificate Configs (Terminated at Nginx Proxy)
    ssl_certificate /etc/letsencrypt/live/aisle.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aisle.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Strict client payload size restrictions (Fix 10)
    client_max_body_size 50M; # Allowed for high resolution product catalogs/images
    
    # Session timeout configuration
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 75s;
    send_timeout 10s;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Main Reverse Proxy Location
    location / {
        proxy_pass http://aisle_backend_servers;
        
        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        # IP and Protocol Forwarding (Vital for Rate Limiters and Security Log IP Tracking)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer configurations to prevent memory exhaustion
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static Assets serving optimization (Vite built files)
    location /assets/ {
        alias /var/www/aisle/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Uploads direct serving optimization
    location /uploads/ {
        alias /var/www/aisle/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
